<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@istracked/datagrid — Kitchen Sink Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .landing {
      max-width: 600px;
      padding: 48px 32px;
      text-align: center;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #64748b; margin-bottom: 40px; font-size: 15px; }
    .cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .card {
      display: block;
      width: 420px;
      padding: 28px 24px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59,130,246,0.12);
    }
    .card h2 { font-size: 18px; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #64748b; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="landing">
    <h1>@istracked/datagrid</h1>
    <p class="subtitle">Playground demos for UI/UX testing</p>
    <div class="cards">
      <a class="card" href="/kitchen-sink/">
        <h2>Kitchen Sink</h2>
        <p>Full-featured demo with every grid capability enabled — MUI components, sorting, filtering, editing, grouping, and more.</p>
      </a>
    </div>
  </div>
</body>
</html>
